<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="card">
      <header>
        <h1>To-Do List</h1>
        <div class="small">Quick, lightweight & saves to your browser</div>
      </header>

      <div class="new-task">
        <input id="taskInput" placeholder="Add a new task and press Enter" aria-label="New task input">
        <button id="addBtn" class="btn primary">Add</button>
      </div>

      <div class="board">
        <ul id="tasks" class="tasks" aria-live="polite"></ul>

        <div class="filters">
          <div id="count" class="small">0 tasks</div>
          <div style="flex:1"></div>
          <div >
            <button class="btn" data-filter="all">All</button>
            <button class="btn" data-filter="active">Active</button>
            <button class="btn" data-filter="completed">Completed</button>
          </div>
          <div style="flex:1"></div>
          <button id="clearCompleted" class="btn">Clear Completed</button>
        </div>
      </div>

    </div>
  </div>
    <script src="app.js"></script>
</body>
</html>
