<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator: Nepalese & Sinhalese to English</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Firebase/Firestore for mandatory setup -->
    <link rel="stylesheet" href="style1.css">
   
   <script src ="app2.js" type="module"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-5xl">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl sm:text-5xl font-extrabold text-gray-800 tracking-tight mb-2">
                AI <span class="gradient-text">Text Translator</span>
            </h1>
            <p class="text-lg text-gray-600">Nepalese & Sinhalese to English Machine Translation</p>
        </header>

        <!-- Translation Interface Card -->
        <div id="translator-card" class="card bg-white rounded-xl p-6 sm:p-10">
            <!-- Language Selector -->
            <div class="mb-6 flex space-x-4">
                <button id="lang-nepali" class="lang-btn bg-purple-600 text-white font-semibold py-2 px-4 rounded-lg shadow-md hover:bg-purple-700 transition" onclick="selectSourceLanguage('Nepalese')">
                    Nepalese
                </button>
                <button id="lang-sinhala" class="lang-btn bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg hover:bg-gray-300 transition" onclick="selectSourceLanguage('Sinhalese')">
                    Sinhalese
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Source Input Panel -->
                <div class="flex flex-col">
                    <label for="source-text" class="text-sm font-medium text-gray-700 mb-2">
                        Source Text (<span id="current-lang-label">Nepalese</span>)
                    </label>
                    <textarea id="source-text" rows="10" class="w-full p-4 border-2 border-purple-200 rounded-xl focus:border-purple-600 transition" placeholder="Enter the text you want to translate here..."></textarea>
                </div>

                <!-- Target Output Panel -->
                <div class="flex flex-col">
                    <label for="target-text" class="text-sm font-medium text-gray-700 mb-2">
                        Target Text (English)
                    </label>
                    <textarea id="target-text" rows="10" readonly class="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-xl cursor-default" placeholder="Your English translation will appear here..."></textarea>
                </div>
            </div>

            <!-- Action Button and Status -->
            <div class="mt-8 flex flex-col sm:flex-row items-center justify-between">
                <button id="translate-btn" class="translate-button w-full sm:w-auto bg-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-700 transition disabled:bg-gray-400" onclick="handleTranslation()">
                    Translate
                </button>
                <div id="status-message" class="text-gray-500 mt-4 sm:mt-0 sm:ml-6 font-medium">Ready to translate!</div>
            </div>

            <!-- Error/Modal Box -->
            <div id="error-box" class="hidden mt-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-xl" role="alert">
                <p id="error-message" class="font-semibold"></p>
            </div>
        </div>
    </div>

    <!-- Main Application Script -->
 <script src ="app1.js" type="module"></script>
 
</body>
</html>
